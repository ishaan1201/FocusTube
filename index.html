<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTube</title>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi,bn,mr,te,ta,gu,kn,ml,pa,ur,or,as', // Match these with your dropdown
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <style>
    /* Aggressively hide the Google Translate Banner */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
      position: static !important;
    }

    /* Hide the google tooltip */
    .goog-tooltip {
      display: none !important;
    }

    .goog-tooltip:hover {
      display: none !important;
    }

    /* Customize the dropdown to match your Dark Theme */
    .goog-te-gadget {
      color: #ffffff !important;
      font-family: sans-serif !important;
    }

    .goog-te-gadget-simple {
      background-color: #222 !important;
      border: 1px solid #333 !important;
      padding: 8px !important;
      border-radius: 8px !important;
    }

    .goog-te-gadget-simple span {
      color: rgb(255, 255, 255) !important;
      font-weight: bold !important;
    }
  </style>
</head>

<body>
  <div id="google_translate_element" style="display:none"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
